name: Build ZuiperfCtl

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "payload/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
      - "*.gradle.kts"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Check scripts
        run: |
          python3 -m py_compile scripts/ApplyZuiperfCtlPayload.py
          bash -n payload/system/bin/zui_perfctld
          bash -n payload/system/etc/zui_perfctl/zui_asoulopt.sh

      - name: Build debug APK
        run: gradle -p . :app:assembleDebug

      - name: Stage payload APK
        run: |
          mkdir -p payload/system/priv-app/ZuiperfCtl
          cp app/build/outputs/apk/debug/app-debug.apk \
            payload/system/priv-app/ZuiperfCtl/ZuiperfCtl.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZuiperfCtl-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload payload
        uses: actions/upload-artifact@v4
        with:
          name: zui-perfctl-v1-payload
          path: payload
